<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMS AI - Super Intelligence Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-primary: #020617;
            --bg-secondary: #070b14;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(15, 23, 42, 0.8);
        }

        .light-theme {
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #2563eb;
            --border: rgba(0, 0, 0, 0.1);
            --glass: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .sidebar { background-color: var(--bg-secondary); border-color: var(--border); }
        .glass-nav { background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }

        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .ai-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #a855f7 100%);
        }

        .model-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .model-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3);
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .message-ai { background-color: var(--bg-secondary); border: 1px solid var(--border); }
        .message-user { background: var(--accent); color: white; }

        #main-input-container {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
        }

        .theme-transition {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar w-80 flex-col hidden lg:flex border-r transition-all duration-300">
        <div class="p-6 border-b border-slate-800/10 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 ai-gradient rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-brain text-white"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-tight">BMS AI</h1>
                    <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">Ultimate Platform</p>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-6">
            <section>
                <h3 class="text-[10px] font-bold text-slate-500 uppercase px-2 mb-3 tracking-widest">Intelligence Mode</h3>
                <div class="space-y-1">
                    <button onclick="updateCategory('Reasoning')" class="w-full text-left p-3 rounded-xl hover:bg-blue-500/10 transition-all text-sm font-medium flex items-center gap-3">
                        <i class="fas fa-microchip text-purple-500"></i> Reasoning Center
                    </button>
                    <button onclick="updateCategory('Creative')" class="w-full text-left p-3 rounded-xl hover:bg-blue-500/10 transition-all text-sm font-medium flex items-center gap-3">
                        <i class="fas fa-pen-nib text-blue-500"></i> Creative & Text
                    </button>
                    <button onclick="updateCategory('Vision')" class="w-full text-left p-3 rounded-xl hover:bg-blue-500/10 transition-all text-sm font-medium flex items-center gap-3">
                        <i class="fas fa-eye text-green-500"></i> Vision Analyst
                    </button>
                    <button onclick="updateCategory('Audio')" class="w-full text-left p-3 rounded-xl hover:bg-blue-500/10 transition-all text-sm font-medium flex items-center gap-3">
                        <i class="fas fa-waveform text-orange-500"></i> Voice System
                    </button>
                </div>
            </section>

            <section>
                <h3 class="text-[10px] font-bold text-slate-500 uppercase px-2 mb-3 tracking-widest">Engine Version</h3>
                <select id="model-select" class="w-full bg-transparent border border-slate-700/30 rounded-xl p-3 text-xs focus:ring-2 ring-blue-500 outline-none cursor-pointer">
                    <!-- Dinamis -->
                </select>
            </section>
        </div>

        <div class="p-4 border-t border-slate-800/10">
            <div class="p-4 rounded-2xl ai-gradient text-white text-center shadow-xl">
                <p class="text-xs font-bold mb-1">BMS Pro Active</p>
                <p class="text-[10px] opacity-80">Unlimited Access & Features</p>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
        <!-- Navbar -->
        <header class="h-16 glass-nav flex items-center justify-between px-6 sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden text-slate-400"><i class="fas fa-bars"></i></button>
                <div class="flex items-center gap-2">
                    <span id="current-category-label" class="text-xs font-black uppercase tracking-[0.2em] text-blue-500">Creative</span>
                    <span class="opacity-20">/</span>
                    <span id="current-model-label" class="text-xs font-medium opacity-60">Titan 70B</span>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <!-- Theme Toggle -->
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-full border border-slate-700/20 flex items-center justify-center hover:bg-slate-500/10 transition-all">
                    <i id="theme-icon" class="fas fa-moon text-sm"></i>
                </button>
                <div class="flex items-center bg-green-500/10 rounded-full px-4 py-1.5 border border-green-500/20">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>
                    <span class="text-[10px] font-bold text-green-500">Server: Optimal</span>
                </div>
            </div>
        </header>

        <!-- Viewport -->
        <div id="chat-viewport" class="flex-1 overflow-y-auto p-4 md:p-10 chat-container">
            <div id="welcome-ui" class="h-full flex flex-col items-center justify-center text-center max-w-2xl mx-auto py-12">
                <div class="relative mb-10">
                    <div class="absolute inset-0 blur-3xl ai-gradient opacity-20 rounded-full"></div>
                    <div class="w-24 h-24 ai-gradient rounded-[2.5rem] flex items-center justify-center relative shadow-2xl animate-pulse">
                        <i class="fas fa-bolt-lightning text-4xl text-white"></i>
                    </div>
                </div>
                <h2 class="text-5xl font-black mb-4 tracking-tighter">BMS <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-purple-500">AI</span></h2>
                <p class="text-slate-500 dark:text-slate-400 mb-12 leading-relaxed text-lg font-medium">
                    Asisten intelijen tingkat lanjut untuk riset, pemrograman, analisis data, dan kreativitas tanpa batas.
                </p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                    <button onclick="quickAction('Bantu saya merancang strategi bisnis inovatif')" class="model-card p-6 rounded-2xl text-left group">
                        <i class="fas fa-chart-line text-blue-500 mb-3 group-hover:scale-125 transition-transform"></i>
                        <h4 class="text-sm font-bold mb-1">Business Analyst</h4>
                        <p class="text-xs text-slate-500">Strategi & Model Bisnis Modern.</p>
                    </button>
                    <button onclick="quickAction('Optimasi kode ini agar lebih efisien')" class="model-card p-6 rounded-2xl text-left group">
                        <i class="fas fa-code text-purple-500 mb-3 group-hover:scale-125 transition-transform"></i>
                        <h4 class="text-sm font-bold mb-1">Advanced Coding</h4>
                        <p class="text-xs text-slate-500">Debugging & Optimasi Arsitektur.</p>
                    </button>
                </div>
            </div>

            <div id="messages" class="hidden space-y-8 max-w-4xl mx-auto pb-20"></div>
        </div>

        <!-- Input Area -->
        <div class="p-6 relative">
            <div class="max-w-4xl mx-auto relative">
                <div id="main-input-container" class="rounded-[2rem] shadow-2xl p-2 transition-all duration-300 focus-within:ring-4 ring-blue-500/20">
                    <div class="flex items-end gap-2 px-4">
                        <button class="mb-3 p-2 text-slate-500 hover:text-blue-500 transition-colors">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        <textarea 
                            id="user-input"
                            rows="1" 
                            placeholder="Apa yang bisa BMS AI bantu hari ini?" 
                            class="flex-1 bg-transparent border-none focus:ring-0 text-current py-4 px-2 text-sm md:text-base resize-none"
                            oninput="autoHeight(this)"
                        ></textarea>
                        <button id="send-btn" onclick="processChat()" class="mb-2 w-12 h-12 ai-gradient rounded-2xl flex items-center justify-center text-white shadow-lg active:scale-90 transition-all">
                            <i class="fas fa-arrow-up text-xl"></i>
                        </button>
                    </div>
                </div>
                <div class="mt-4 flex justify-center gap-6 overflow-hidden">
                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                        <i class="fas fa-lock text-blue-500"></i> Sesi Terenkripsi
                    </span>
                    <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                        <i class="fas fa-shield-check text-green-500"></i> Keamanan Level 5
                    </span>
                </div>
            </div>
        </div>
    </main>

    <script>
        /**
         * BMS AI - Advanced Intelligence Engine
         * Security Implementation: Key Obfuscation & Dynamic Theming
         */
        
        // Memecah kunci menjadi beberapa bagian untuk menghindari deteksi crawler sederhana
        const _p1 = "Z3NrXzZFlWJ1eTdxd29OY3NhVlQzWXNDV";
        const _p2 = "WRdyeWIzRllseTF1M2cxTVNRalI2MWVWMXEqdmFhUzk=";
        const _v = (s) => atob(s.replace(/[^A-Za-z0-9+/=]/g, ""));
        
        const getK = () => _v(_p1 + _p2);

        const models = {
            "Reasoning": ["BMS Logic-1 (120B)", "BMS Logic-2 (20B)", "Qwen Multi-Reason"],
            "Creative": ["BMS Titan 70B", "BMS Kreatif v4", "Kimi Ultra 2"],
            "Vision": ["BMS Vision-X"],
            "Audio": ["Eleven Voice", "Whisper BMS Turbo", "Orpheus Saudi"],
        };

        let currentCategory = "Creative";
        let isProcessing = false;
        let isDarkMode = true;

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-theme');
            const icon = document.getElementById('theme-icon');
            icon.className = isDarkMode ? 'fas fa-moon' : 'fas fa-sun';
        }

        function updateCategory(cat) {
            currentCategory = cat;
            document.getElementById('current-category-label').innerText = cat;
            const select = document.getElementById('model-select');
            select.innerHTML = '';
            
            models[cat].forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.innerText = m;
                select.appendChild(opt);
            });
            document.getElementById('current-model-label').innerText = models[cat][0];
        }

        // Initialize UI
        updateCategory("Creative");

        function autoHeight(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        async function processChat() {
            const input = document.getElementById('user-input');
            const prompt = input.value.trim();
            if (!prompt || isProcessing) return;

            isProcessing = true;
            document.getElementById('welcome-ui').classList.add('hidden');
            const messages = document.getElementById('messages');
            messages.classList.remove('hidden');

            appendMessage('user', prompt);
            input.value = '';
            input.style.height = 'auto';

            const loadingId = appendLoading();

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${getK()}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { 
                                role: "system", 
                                content: "Anda adalah BMS AI, asisten intelijen tercanggih di dunia. Anda profesional, kreatif, dan sangat cerdas dalam membantu tugas apa pun. Jangan pernah menyebutkan sumber API atau pihak ketiga." 
                            },
                            { role: "user", content: prompt }
                        ],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                document.getElementById(loadingId).remove();
                
                if (data.choices && data.choices[0].message) {
                    appendMessage('ai', data.choices[0].message.content);
                } else {
                    throw new Error("Engine Busy");
                }
            } catch (err) {
                document.getElementById(loadingId).remove();
                appendMessage('ai', "Sistem BMS AI sedang melakukan optimasi server. Silakan kirimkan ulang pesan Anda dalam beberapa saat.");
                console.error("API Failure:", err);
            } finally {
                isProcessing = false;
            }
        }

        function appendMessage(role, text) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `flex gap-4 ${role === 'user' ? 'justify-end' : ''} animate-fadeIn`;
            
            div.innerHTML = `
                ${role === 'ai' ? `
                    <div class="w-10 h-10 rounded-xl ai-gradient flex-shrink-0 flex items-center justify-center shadow-lg">
                        <i class="fas fa-bolt text-white text-xs"></i>
                    </div>
                ` : ''}
                <div class="max-w-[85%] space-y-2">
                    <div class="p-5 rounded-[1.5rem] ${role === 'user' ? 'message-user shadow-lg' : 'message-ai shadow-sm'}">
                        <p class="text-sm md:text-base leading-relaxed whitespace-pre-wrap">${text}</p>
                    </div>
                </div>
                ${role === 'user' ? `
                    <div class="w-10 h-10 rounded-xl bg-slate-500 flex-shrink-0 flex items-center justify-center font-bold text-xs text-white">U</div>
                ` : ''}
            `;
            container.appendChild(div);
            scrollDown();
        }

        function appendLoading() {
            const id = 'loader-' + Date.now();
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex gap-4";
            div.innerHTML = `
                <div class="w-10 h-10 rounded-xl ai-gradient flex-shrink-0 flex items-center justify-center">
                    <i class="fas fa-bolt text-white text-xs"></i>
                </div>
                <div class="flex items-center gap-1.5 p-5 bg-slate-500/10 rounded-[1.5rem] border border-slate-700/10">
                    <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
                </div>
            `;
            container.appendChild(div);
            scrollDown();
            return id;
        }

        function scrollDown() {
            const v = document.getElementById('chat-viewport');
            v.scrollTo({ top: v.scrollHeight, behavior: 'smooth' });
        }

        function quickAction(text) {
            document.getElementById('user-input').value = text;
            processChat();
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('hidden');
            sb.classList.toggle('flex');
        }

        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                processChat();
            }
        });
    </script>
</body>
</html>
