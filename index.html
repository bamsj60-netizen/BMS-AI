<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMS AI | Next-Gen Intelligence Platform</title>
    <!-- Framework & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #c084fc;
            --bg-dark: #050609;
            --card-dark: #0f1117;
            --bg-light: #f8fafc;
            --card-light: #ffffff;
            --transition-speed: 0.5s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        .font-outfit { font-family: 'Outfit', sans-serif; }

        body.dark { background-color: var(--bg-dark); color: #e2e8f0; }
        body.light { background-color: var(--bg-light); color: #0f172a; }

        .glass {
            backdrop-filter: blur(20px) saturate(200%);
            -webkit-backdrop-filter: blur(20px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .dark .glass { background: rgba(15, 17, 23, 0.75); border-color: rgba(255, 255, 255, 0.08); }
        .light .glass { background: rgba(255, 255, 255, 0.75); border-color: rgba(0, 0, 0, 0.05); }

        .msg-container {
            max-width: 85%;
            padding: 1.25rem;
            border-radius: 24px;
            animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dark .user-msg {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
        }
        
        .light .user-msg {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            box-shadow: 0 8px 20px -4px rgba(59, 130, 246, 0.3);
        }

        /* Markdown Styling for AI Response */
        .ai-content h1, .ai-content h2, .ai-content h3 { font-weight: 800; margin-bottom: 0.5rem; }
        .ai-content ul, .ai-content ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
        .ai-content li { margin-bottom: 0.25rem; }
        .ai-content p { margin-bottom: 0.75rem; line-height: 1.6; }
        .ai-content code { background: rgba(255,255,255,0.1); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        @keyframes typing {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(-5px); opacity: 1; }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .loading-shimmer {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        select optgroup {
            background: #0f1117;
            color: #94a3b8;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body class="dark" id="app">

    <div class="flex h-screen overflow-hidden relative">
        
        <!-- SIDEBAR -->
        <aside id="sidebar" class="w-80 glass flex flex-col fixed inset-y-0 left-0 z-50 transform -translate-x-full lg:relative lg:translate-x-0 transition-transform duration-300">
            <div class="p-8">
                <div class="flex items-center gap-4 mb-10">
                    <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-purple-600 rounded-2xl flex items-center justify-center text-white shadow-2xl">
                        <i class="fas fa-microchip text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-extrabold font-outfit tracking-tighter">BMS <span class="text-blue-500">AI</span></h1>
                        <p class="text-[9px] font-bold uppercase tracking-[0.3em] opacity-50">Unified OS v5.0</p>
                    </div>
                </div>

                <button onclick="createNewChat()" class="w-full py-4 px-6 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold flex items-center justify-center gap-3 transition-all shadow-xl shadow-blue-600/20 active:scale-95">
                    <i class="fas fa-plus"></i> Proyek Baru
                </button>
            </div>

            <div class="flex-1 overflow-y-auto px-4 space-y-2" id="history-container"></div>

            <div class="p-6 border-t border-white/5 space-y-4">
                <div class="space-y-3">
                    <label class="text-[10px] font-bold uppercase tracking-widest opacity-40 px-2">Arsitektur Mesin</label>
                    <select id="model-selector" class="w-full bg-black/40 dark:text-white border border-white/10 rounded-xl p-3 text-xs font-semibold outline-none cursor-pointer">
                        <optgroup label="Reasoning">
                            <option value="gpt-oss-120b">GPT OSS 120B</option>
                            <option value="gpt-oss-20b">GPT OSS 20B</option>
                            <option value="qwen-3-32b">Qwen 3 32B</option>
                        </optgroup>
                        <optgroup label="Function Calling / Tool Use">
                            <option value="gpt-oss-120b">GPT OSS 120B</option>
                            <option value="gpt-oss-20b">GPT OSS 20B</option>
                            <option value="llama-4-scout">Llama 4 Scout</option>
                            <option value="qwen-3-32b">Qwen 3 32B</option>
                            <option value="kimi-k2">Kimi K2</option>
                        </optgroup>
                        <optgroup label="Text to Speech">
                            <option value="elevenlabs-tts">ElevenLabs TTS</option>
                            <option value="orpheus-english">Orpheus English</option>
                            <option value="orpheus-arabic">Orpheus Arabic Saudi</option>
                        </optgroup>
                        <optgroup label="Speech to Text">
                            <option value="whisper-v3">Whisper Large v3</option>
                            <option value="whisper-v3-turbo">Whisper Large v3 Turbo</option>
                        </optgroup>
                        <optgroup label="Text to Text">
                            <option value="gpt-oss-120b">GPT OSS 120B</option>
                            <option value="gpt-oss-20b">GPT OSS 20B</option>
                            <option value="kimi-k2">Kimi K2</option>
                            <option value="llama-4-scout">Llama 4 Scout</option>
                            <option value="llama-3.3-70b">Llama 3.3 70B</option>
                        </optgroup>
                        <optgroup label="Vision">
                            <option value="llama-4-scout">Llama 4 Scout</option>
                        </optgroup>
                        <optgroup label="Multilingual">
                            <option value="gpt-oss-120b">GPT OSS 120B</option>
                            <option value="gpt-oss-20b">GPT OSS 20B</option>
                            <option value="kimi-k2">Kimi K2</option>
                            <option value="llama-4-scout">Llama 4 Scout</option>
                            <option value="llama-3.3-70b">Llama 3.3 70B</option>
                            <option value="whisper-v3">Whisper Large v3</option>
                        </optgroup>
                        <optgroup label="Safety / Content Moderation">
                            <option value="safety-gpt-oss-20b">Safety GPT OSS 20B</option>
                        </optgroup>
                        <optgroup label="Creative">
                            <option value="imagen-4.0">Imagen 4.0 (AI Image Gen)</option>
                        </optgroup>
                    </select>
                </div>

                <div class="flex items-center justify-between p-2 rounded-2xl bg-black/10">
                    <button onclick="toggleTheme()" class="w-11 h-11 flex items-center justify-center rounded-xl hover:bg-white/10 transition-all text-xl">
                        <i id="theme-icon" class="fas fa-moon text-blue-400"></i>
                    </button>
                    <div class="flex gap-2">
                         <button onclick="document.getElementById('model-selector').value = 'imagen-4.0'; updateUIOnModelChange();" class="w-11 h-11 flex items-center justify-center rounded-xl hover:bg-white/10 transition-all text-xl text-purple-400" title="Pilih Mode Gambar">
                            <i class="fas fa-wand-magic-sparkles"></i>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN VIEW -->
        <main class="flex-1 flex flex-col min-w-0 h-full relative">
            <header class="h-20 glass flex items-center justify-between px-8 z-20">
                <div class="flex items-center gap-6">
                    <button onclick="toggleSidebar()" class="lg:hidden text-2xl"><i class="fas fa-bars"></i></button>
                    <div>
                        <h2 id="active-chat-name" class="text-sm font-extrabold tracking-tight uppercase">Terminal Aktif</h2>
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            <span class="text-[9px] font-bold opacity-50 uppercase tracking-widest" id="active-model-name">GPT OSS 120B</span>
                        </div>
                    </div>
                </div>
            </header>

            <div id="chat-viewport" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-10"></div>

            <div class="p-6 md:p-10">
                <div class="max-w-5xl mx-auto">
                    <div id="media-preview" class="hidden mb-4 p-4 glass rounded-3xl flex items-center gap-4">
                        <div id="preview-frame" class="w-16 h-16 rounded-2xl bg-cover bg-center border border-white/10"></div>
                        <button onclick="clearMedia()" class="text-red-500"><i class="fas fa-times"></i></button>
                    </div>

                    <div class="relative glass rounded-[2.5rem] p-3 shadow-2xl border border-white/5 focus-within:border-blue-500/50 transition-all">
                        <div class="flex items-end gap-2">
                            <input type="file" id="file-upload" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
                            <button onclick="document.getElementById('file-upload').click()" class="w-14 h-14 flex items-center justify-center text-gray-400 hover:text-blue-500">
                                <i class="fas fa-camera text-xl"></i>
                            </button>
                            
                            <textarea id="main-input" rows="1" placeholder="Masukkan pesan Anda..." 
                                class="flex-1 bg-transparent border-none focus:ring-0 py-4 px-2 text-base resize-none max-h-60 outline-none"></textarea>

                            <button onclick="handleSend()" id="send-btn" class="w-14 h-14 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-[1.5rem] flex items-center justify-center shadow-lg hover:scale-105 transition-all">
                                <i class="fas fa-paper-plane text-lg"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const apiKey = ""; 
        let state = {
            chats: JSON.parse(localStorage.getItem('bms_v5_pro')) || [],
            activeId: null,
            theme: 'dark',
            attachedMedia: null,
            isTyping: false
        };

        const welcomeHTML = `
            <div class="max-w-3xl mx-auto py-20 text-center space-y-10">
                <div class="w-20 h-20 bg-blue-600/20 rounded-3xl mx-auto flex items-center justify-center border border-blue-500/30">
                    <i class="fas fa-brain text-4xl text-blue-500"></i>
                </div>
                <h1 class="text-4xl font-extrabold font-outfit">Sistem Terintegrasi <span class="text-blue-500">BMS AI</span></h1>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="p-6 glass rounded-2xl text-left border-l-4 border-blue-500">
                        <h4 class="font-bold text-xs uppercase mb-2">High-Performance Reasoning</h4>
                        <p class="text-xs opacity-60">Arsitektur GPT OSS 120B untuk solusi logika dan analisis mendalam.</p>
                    </div>
                    <div class="p-6 glass rounded-2xl text-left border-l-4 border-purple-500">
                        <h4 class="font-bold text-xs uppercase mb-2">Creative Imagen 4.0</h4>
                        <p class="text-xs opacity-60">Visualisasikan ide Anda secara instan menggunakan arsitektur Imagen terbaru.</p>
                    </div>
                </div>
            </div>`;

        window.onload = () => {
            renderMessages();
            renderHistory();
            
            const mainInput = document.getElementById('main-input');
            document.getElementById('model-selector').onchange = updateUIOnModelChange;

            // Enter to Send logic
            mainInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });
            updateUIOnModelChange();
        };

        function updateUIOnModelChange() {
            const selector = document.getElementById('model-selector');
            const modelName = selector.options[selector.selectedIndex].text;
            document.getElementById('active-model-name').innerText = modelName;
            
            const input = document.getElementById('main-input');
            if(selector.value === 'imagen-4.0') {
                input.placeholder = "Tulis deskripsi gambar yang ingin dibuat...";
            } else {
                input.placeholder = `Kirim pesan ke ${modelName}...`;
            }
        }

        function createNewChat() {
            const chat = { id: Date.now(), title: 'Obrolan Baru', messages: [] };
            state.chats.unshift(chat);
            state.activeId = chat.id;
            saveData();
            renderMessages();
            renderHistory();
        }

        async function handleSend() {
            if(state.isTyping) return;
            const input = document.getElementById('main-input');
            const text = input.value.trim();
            const selectedValue = document.getElementById('model-selector').value;

            if(!text && !state.attachedMedia) return;

            // Handle Image Generation Model
            if(selectedValue === 'imagen-4.0') {
                input.value = '';
                await runImageGeneration(text);
                return;
            }

            if(!state.activeId) createNewChat();
            const chat = state.chats.find(c => c.id === state.activeId);

            const userMsg = { role: 'user', content: text, media: state.attachedMedia };
            chat.messages.push(userMsg);
            renderMessages();
            input.value = '';
            
            const mediaData = state.attachedMedia;
            clearMedia();
            state.isTyping = true;
            const typingId = showTyping();

            try {
                // Gunakan model internal gemini-2.5-flash-preview-09-2025 namun tidak ditampilkan ke user
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: text || "Analisis input ini." },
                                ...(mediaData ? [{ inlineData: { mimeType: "image/png", data: mediaData.split(',')[1] } }] : [])
                            ]
                        }],
                        systemInstruction: { 
                            parts: [{ text: `Nama Anda adalah BMS AI Pro dengan model ${document.getElementById('model-selector').options[document.getElementById('model-selector').selectedIndex].text}. Berikan jawaban yang sangat terstruktur menggunakan markdown (tabel, list, bold) agar mudah dibaca. Jangan menyebutkan identitas teknis mesin atau Google.` }] 
                        }
                    })
                });
                
                const result = await res.json();
                const responseText = result.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf, terjadi kendala teknis pada transmisi data.";

                hideTyping(typingId);
                chat.messages.push({ role: 'ai', content: responseText });
                saveData();
                renderMessages();
            } catch (e) {
                hideTyping(typingId);
                console.error(e);
            } finally {
                state.isTyping = false;
            }
        }

        async function runImageGeneration(prompt) {
            if(!prompt) return;
            if(!state.activeId) createNewChat();
            const chat = state.chats.find(c => c.id === state.activeId);
            
            const msgId = 'img-' + Date.now();
            chat.messages.push({ role: 'ai', content: `Menginisialisasi Arsitektur Imagen 4.0... Mengolah: _"${prompt}"_`, id: msgId, isLoading: true });
            renderMessages();
            state.isTyping = true;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: { prompt: prompt },
                        parameters: { sampleCount: 1 }
                    })
                });
                
                const result = await res.json();
                const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;

                const msgIndex = chat.messages.findIndex(m => m.id === msgId);
                if(msgIndex !== -1) {
                    chat.messages[msgIndex] = {
                        role: 'ai',
                        content: `**Visualisasi Imagen 4.0 Selesai**\nPrompt: ${prompt}`,
                        media: imageUrl
                    };
                }
                saveData();
                renderMessages();
            } catch (e) {
                const msgIndex = chat.messages.findIndex(m => m.id === msgId);
                if(msgIndex !== -1) chat.messages[msgIndex].content = "Gagal memproses visualisasi. Pastikan deskripsi sesuai kebijakan.";
                renderMessages();
            } finally {
                state.isTyping = false;
            }
        }

        async function speak(text, btn) {
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i>';
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });
                const result = await res.json();
                const inlineData = result.candidates[0].content.parts[0].inlineData;
                const sampleRate = parseInt(inlineData.mimeType.split('rate=')[1]) || 24000;
                
                const pcmBinary = Uint8Array.from(atob(inlineData.data), c => c.charCodeAt(0));
                
                // WAV Header logic
                const buffer = new ArrayBuffer(44 + pcmBinary.length);
                const view = new DataView(buffer);
                const writeStr = (o, s) => { for(let i=0; i<s.length; i++) view.setUint8(o+i, s.charCodeAt(i)); };
                writeStr(0, 'RIFF');
                view.setUint32(4, 36 + pcmBinary.length, true);
                writeStr(8, 'WAVE');
                writeStr(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeStr(36, 'data');
                view.setUint32(40, pcmBinary.length, true);
                for(let i=0; i<pcmBinary.length; i++) view.setUint8(44+i, pcmBinary[i]);

                const audio = new Audio(URL.createObjectURL(new Blob([buffer], {type: 'audio/wav'})));
                audio.play();
                btn.innerHTML = originalHtml;
            } catch (e) {
                btn.innerHTML = '<i class="fas fa-exclamation-circle text-red-500"></i>';
                setTimeout(() => btn.innerHTML = originalHtml, 2000);
            }
        }

        function renderMessages() {
            const viewport = document.getElementById('chat-viewport');
            const chat = state.chats.find(c => c.id === state.activeId);
            if(!chat || chat.messages.length === 0) {
                viewport.innerHTML = welcomeHTML;
                return;
            }
            viewport.innerHTML = '';
            chat.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `flex w-full ${msg.role === 'user' ? 'justify-end' : 'justify-start'} mb-6`;
                
                let mediaHtml = '';
                if(msg.isLoading) {
                    mediaHtml = `<div class="w-full aspect-square rounded-xl loading-shimmer mb-3 flex items-center justify-center"><i class="fas fa-wand-magic text-white/20 text-4xl animate-pulse"></i></div>`;
                } else if(msg.media) {
                    mediaHtml = `<img src="${msg.media}" class="rounded-xl mb-3 max-w-full border border-white/10 shadow-lg cursor-zoom-in" onclick="window.open('${msg.media}')">`;
                }

                const ttsBtn = (msg.role === 'ai' && !msg.isLoading) ? `<button onclick="speak(\`${msg.content.replace(/[`'"]/g, '')}\`, this)" class="mt-3 text-[10px] uppercase font-bold text-blue-500 flex items-center gap-2 hover:opacity-70"><i class="fas fa-volume-up"></i> Putar Suara</button>` : '';

                // Simple parser for Markdown-like structure
                const contentHtml = msg.content
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/\n/g, '<br>');

                div.innerHTML = `
                    <div class="msg-container ${msg.role === 'user' ? 'user-msg' : 'glass border border-white/5'}">
                        ${mediaHtml}
                        <div class="text-sm leading-relaxed ai-content">${contentHtml}</div>
                        ${ttsBtn}
                    </div>`;
                viewport.appendChild(div);
            });
            viewport.scrollTop = viewport.scrollHeight;
        }

        function showTyping() {
            const id = 'typing-' + Date.now();
            const viewport = document.getElementById('chat-viewport');
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex justify-start mb-6';
            div.innerHTML = `<div class="msg-container glass flex gap-2"><div class="typing-dot"></div><div class="typing-dot" style="animation-delay:0.1s"></div><div class="typing-dot" style="animation-delay:0.2s"></div></div>`;
            viewport.appendChild(div);
            viewport.scrollTop = viewport.scrollHeight;
            return id;
        }

        function hideTyping(id) { const el = document.getElementById(id); if(el) el.remove(); }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                state.attachedMedia = ev.target.result;
                document.getElementById('media-preview').classList.remove('hidden');
                document.getElementById('preview-frame').style.backgroundImage = `url(${ev.target.result})`;
            };
            reader.readAsDataURL(file);
        }

        function clearMedia() {
            state.attachedMedia = null;
            document.getElementById('media-preview').classList.add('hidden');
        }

        function renderHistory() {
            const cont = document.getElementById('history-container');
            cont.innerHTML = '';
            state.chats.forEach(c => {
                const div = document.createElement('div');
                div.className = `p-4 rounded-xl cursor-pointer text-xs font-bold uppercase transition-all ${state.activeId === c.id ? 'bg-blue-600/20 text-blue-500 border border-blue-500/30' : 'hover:bg-white/5 opacity-50'}`;
                div.innerText = c.title.length > 25 ? c.title.substring(0, 25) + '...' : c.title;
                div.onclick = () => { state.activeId = c.id; renderMessages(); renderHistory(); };
                cont.appendChild(div);
            });
        }

        function saveData() { 
            try {
                const data = state.chats.map(chat => ({ ...chat, messages: chat.messages.map(m => { const {media, ...rest} = m; return rest; }) }));
                localStorage.setItem('bms_v5_pro', JSON.stringify(data.slice(0, 15))); 
            } catch (e) {}
        }

        function toggleTheme() {
            document.body.classList.toggle('light');
            document.body.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
    </script>
</body>
</html>
