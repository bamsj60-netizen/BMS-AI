<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMS AI - Super Intelligence Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --bg-dark: #0a0a0a;
            --card-dark: #141414;
            --bg-light: #f8fafc;
            --card-light: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow: hidden;
        }

        .dark {
            background-color: var(--bg-dark);
            color: #e2e8f0;
        }

        .light {
            background-color: var(--bg-light);
            color: #1e293b;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }

        .glass-dark {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-light {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        .message-bubble {
            max-width: 85%;
            padding: 1rem;
            border-radius: 1.25rem;
            margin-bottom: 1rem;
            position: relative;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background-color: currentColor;
            display: inline-block;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Hiding API Logic from quick view */
        #core-engine { display: none; }
    </style>
</head>
<body class="dark" id="main-body">

    <!-- App Shell -->
    <div class="flex h-screen overflow-hidden">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar-transition fixed inset-y-0 left-0 z-50 w-72 transform -translate-x-full md:relative md:translate-x-0 glass-dark">
            <div class="flex flex-col h-full p-4">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20">
                            <i class="fas fa-brain text-xl"></i>
                        </div>
                        <h1 class="text-xl font-bold tracking-tight">BMS AI</h1>
                    </div>
                    <button onclick="toggleSidebar()" class="md:hidden text-gray-400"><i class="fas fa-times"></i></button>
                </div>

                <!-- Model Selector -->
                <div class="mb-6">
                    <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Kategori Model</label>
                    <select id="category-select" onchange="updateModels()" class="w-full bg-transparent border border-gray-700 rounded-lg p-2 text-sm focus:ring-2 ring-blue-500 outline-none">
                        <option value="reasoning">Reasoning</option>
                        <option value="text">Text to Text</option>
                        <option value="vision">Vision</option>
                        <option value="function">Function Calling</option>
                        <option value="multilingual">Multilingual</option>
                    </select>
                </div>

                <div class="mb-6">
                    <label class="text-xs font-semibold text-gray-500 uppercase mb-2 block">Pilih Model</label>
                    <div id="model-list" class="space-y-1 overflow-y-auto max-h-48 pr-2">
                        <!-- Models injected here -->
                    </div>
                </div>

                <!-- Theme Switcher -->
                <div class="mt-auto pt-4 border-t border-gray-800">
                    <button onclick="toggleTheme()" class="flex items-center gap-3 w-full p-3 rounded-xl hover:bg-white/5 transition-colors">
                        <i id="theme-icon" class="fas fa-moon text-blue-400"></i>
                        <span id="theme-text" class="text-sm font-medium">Mode Gelap</span>
                    </button>
                    <div class="mt-4 p-3 bg-blue-600/10 border border-blue-500/20 rounded-xl">
                        <p class="text-[10px] text-blue-400 font-medium uppercase">API Status</p>
                        <p class="text-xs mt-1">Sistem Aktif & Terenkripsi</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="flex-1 flex flex-col relative min-w-0">
            
            <!-- Top Nav -->
            <header class="h-16 flex items-center justify-between px-6 border-b border-gray-800/50">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="md:hidden text-gray-400"><i class="fas fa-bars"></i></button>
                    <div class="flex flex-col">
                        <span id="active-model-display" class="text-sm font-bold">GPT OSS 120B</span>
                        <span class="text-[10px] text-green-500 flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                            Online & Ready
                        </span>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button title="Fitur Audio" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-800 transition-colors">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <div class="w-9 h-9 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-full flex items-center justify-center text-xs font-bold text-white shadow-lg">
                        US
                    </div>
                </div>
            </header>

            <!-- Chat Messages -->
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
                <!-- Welcome Message -->
                <div class="max-w-3xl mx-auto text-center py-12 animate-fade">
                    <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center mx-auto mb-6">
                        <i class="fas fa-bolt text-4xl text-blue-500"></i>
                    </div>
                    <h2 class="text-3xl font-bold mb-3">Selamat Datang di BMS AI</h2>
                    <p class="text-gray-500 text-lg max-w-md mx-auto">Platform AI multifungsi tanpa batasan. Pilih model favoritmu dan mulailah berkreasi.</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 md:p-6 bg-transparent">
                <div class="max-w-4xl mx-auto relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl blur opacity-20 group-focus-within:opacity-40 transition duration-1000"></div>
                    <div class="relative flex items-end gap-2 bg-white dark:bg-[#1a1a1a] rounded-2xl p-2 shadow-2xl border border-gray-200 dark:border-gray-800">
                        <button class="p-3 text-gray-400 hover:text-blue-500 transition-colors">
                            <i class="fas fa-plus-circle text-xl"></i>
                        </button>
                        <textarea id="user-input" rows="1" placeholder="Tanyakan apa saja pada BMS AI..." 
                            class="w-full bg-transparent border-none focus:ring-0 py-3 px-2 resize-none text-sm md:text-base max-h-48"
                            oninput="autoResize(this)"></textarea>
                        
                        <!-- Advanced Tools -->
                        <div class="flex items-center gap-1 mb-1">
                            <button onclick="handleVoice()" class="p-3 text-gray-400 hover:text-blue-500 transition-colors" title="Speech to Text">
                                <i class="fas fa-microphone-alt"></i>
                            </button>
                            <button onclick="sendMessage()" class="p-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-all shadow-lg active:scale-95">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                    <p class="text-center text-[10px] text-gray-500 mt-3 uppercase tracking-widest font-medium">Powering Professional Intelligence • No Limits</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden Core Logic (Security Layer) -->
    <script id="core-engine">
        // Obfuscated Key Handling (Basic Client-Side Obfuscation)
        const _k = "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";
        
        const MODEL_DATA = {
            reasoning: ["GPT OSS 120B", "GPT OSS 20B", "Qwen 3 32B"],
            text: ["GPT OSS 120B", "GPT OSS 20B", "Kimi K2", "Llama 4 Scout", "Llama 3.3 70B"],
            vision: ["Llama 4 Scout"],
            function: ["GPT OSS 120B", "GPT OSS 20B", "Llama 4 Scout", "Qwen 3 32B", "Kimi K2"],
            multilingual: ["GPT OSS 120B", "Kimi K2", "Llama 4 Scout"]
        };

        let currentTheme = 'dark';
        let currentModel = "GPT OSS 120B";

        function toggleTheme() {
            const body = document.getElementById('main-body');
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            const sidebar = document.getElementById('sidebar');

            if (currentTheme === 'dark') {
                body.classList.remove('dark');
                body.classList.add('light');
                sidebar.classList.remove('glass-dark');
                sidebar.classList.add('glass-light');
                icon.classList.replace('fa-moon', 'fa-sun');
                icon.classList.replace('text-blue-400', 'text-orange-500');
                text.innerText = "Mode Terang";
                currentTheme = 'light';
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
                sidebar.classList.remove('glass-light');
                sidebar.classList.add('glass-dark');
                icon.classList.replace('fa-sun', 'fa-moon');
                icon.classList.replace('text-orange-500', 'text-blue-400');
                text.innerText = "Mode Gelap";
                currentTheme = 'dark';
            }
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('-translate-x-full');
        }

        function updateModels() {
            const cat = document.getElementById('category-select').value;
            const container = document.getElementById('model-list');
            container.innerHTML = '';
            
            MODEL_DATA[cat].forEach(model => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-2 rounded-lg text-sm transition-all flex items-center justify-between group ${currentModel === model ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30' : 'hover:bg-white/5 text-gray-400'}`;
                btn.onclick = () => selectModel(model);
                btn.innerHTML = `
                    <span>${model}</span>
                    <i class="fas fa-check-circle text-[10px] ${currentModel === model ? 'opacity-100' : 'opacity-0'} group-hover:opacity-50"></i>
                `;
                container.appendChild(btn);
            });
        }

        function selectModel(name) {
            currentModel = name;
            document.getElementById('active-model-display').innerText = name;
            updateModels();
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            const text = input.value.trim();
            
            if (!text) return;

            // Remove welcome screen if exists
            const welcome = container.querySelector('.animate-fade');
            if(welcome && welcome.innerText.includes('Selamat Datang')) welcome.remove();

            // Append User Message
            appendMessage('user', text);
            input.value = '';
            input.style.height = 'auto';

            // Show Typing Indicator
            const typingId = appendTypingIndicator();
            
            try {
                const response = await fetchGroqChat(text);
                removeTypingIndicator(typingId);
                appendMessage('ai', response);
            } catch (error) {
                removeTypingIndicator(typingId);
                appendMessage('ai', "Maaf, terjadi kesalahan pada engine BMS. Silakan coba lagi.");
            }
        }

        function appendMessage(role, text) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-fade`;
            
            const content = role === 'user' 
                ? `<div class="message-bubble bg-blue-600 text-white shadow-lg">${text}</div>`
                : `<div class="message-bubble dark:bg-[#141414] bg-white border border-gray-200 dark:border-gray-800 shadow-sm">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-6 h-6 bg-blue-500 rounded flex items-center justify-center text-[10px] text-white">BMS</div>
                        <span class="text-xs font-bold uppercase tracking-wider text-gray-500">${currentModel}</span>
                    </div>
                    <div class="text-sm leading-relaxed">${text.replace(/\n/g, '<br>')}</div>
                    <div class="flex gap-3 mt-4 pt-3 border-t border-gray-100 dark:border-gray-800">
                        <button onclick="copyText(this)" class="text-xs text-gray-500 hover:text-blue-500"><i class="far fa-copy"></i> Copy</button>
                        <button class="text-xs text-gray-500 hover:text-blue-500"><i class="fas fa-volume-up"></i> Speak</button>
                    </div>
                   </div>`;
            
            div.innerHTML = content;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function appendTypingIndicator() {
            const id = 'typing-' + Date.now();
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.id = id;
            div.className = `flex justify-start animate-fade`;
            div.innerHTML = `
                <div class="message-bubble dark:bg-[#141414] bg-white border border-gray-800">
                    <div class="typing-dots text-blue-500">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if(el) el.remove();
        }

        async function fetchGroqChat(prompt) {
            // Mapping friendly names to Groq-compatible models (fallback logic)
            let modelId = "llama-3.3-70b-versatile"; 
            if(currentModel.includes("Qwen")) modelId = "qwen-2.5-32b";
            if(currentModel.includes("20B")) modelId = "llama-3.1-8b-instant";

            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${_k}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: modelId,
                    messages: [
                        { role: "system", content: "Nama kamu adalah BMS AI, asisten super cerdas dengan fitur lengkap. Kamu asik, profesional, dan membantu user tanpa batasan." },
                        { role: "user", content: prompt }
                    ],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            return data.choices[0].message.content;
        }

        function copyText(btn) {
            const text = btn.closest('.message-bubble').querySelector('.text-sm').innerText;
            navigator.clipboard.writeText(text);
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            setTimeout(() => btn.innerHTML = original, 2000);
        }

        function handleVoice() {
            // Simulated voice feature
            const btn = event.currentTarget;
            btn.classList.add('text-red-500', 'animate-pulse');
            setTimeout(() => {
                btn.classList.remove('text-red-500', 'animate-pulse');
            }, 3000);
        }

        // Init
        window.onload = () => {
            updateModels();
            console.log("%cBMS AI Engine %cSecurely Loaded", "color: #3b82f6; font-weight: bold; font-size: 14px;", "color: gray; font-size: 12px;");
        };

        // Prevent typical F12 inspect for basic security (though not foolproof)
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }
    </script>
</body>
</html>
